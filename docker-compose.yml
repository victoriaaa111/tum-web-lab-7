services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wjuser
      POSTGRES_PASSWORD: wjpassword
      POSTGRES_DB: workout_journal
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://wjuser:wjpassword@db:5432/workout_journal
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
    depends_on:
      - db

volumes:
  db_data:
